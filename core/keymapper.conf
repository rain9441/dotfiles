# Raise-or-run app launcher shortcuts
Meta{M} >> $($HOME/.raise-or-run.sh claude claude-desktop) ^
Meta{N} >> $($HOME/.raise-or-run.sh neovide neovide) ^
Meta{B} >> $($HOME/.raise-or-run.sh chrome chrome) ^
Meta{H} >> $($HOME/.raise-or-run.sh github github-desktop) ^
Meta{K} >> $($HOME/.raise-or-run.sh kcalc kcalc) ^
Control{Backquote} >> $($HOME/.raise-or-run.sh wezterm wezterm) ^

# Pass all other Meta combinations through to KDE unchanged
Meta{Any} >> Meta{Any}
